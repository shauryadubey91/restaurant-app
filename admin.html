<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* HEADER */
.header{
  padding:15px 20px;
  background:#020617;
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid #1e293b;
}

/* SECTION */
.section{
  padding:20px;
}

/* FORM BOX */
.form-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

/* INPUT */
input{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  width:200px;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

/* MENU LIST */
.menu-item{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.menu-item:hover{
  transform:scale(1.02);
}

/* DELETE BUTTON */
.delete-btn{
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:6px;
}


</style>

</head>

<body>

<body>

<div class="header">📊 Admin Dashboard</div>

<div class="container">

  <!-- 🔥 ORDERS -->
  <div id="orders"></div>

  <!-- 🔥 YAHAN ADD KAR (MENU SECTION) -->
  <div class="section">

    <h2>🍽️ Manage Menu</h2>

    <div class="form-box">
      <input id="itemName" placeholder="Item Name">
      <input id="itemPrice" placeholder="Price">
      <input id="itemCategory" placeholder="Category">
      <button onclick="addItem()">Add Item</button>
    </div>

    <div id="menuList"></div>

  </div>

</div>

</body>



<script>

function loadOrders(){
fetch("http://localhost:5000/orders")
.then(res=>res.json())
.then(data=>{

document.getElementById("orders").innerHTML = data.map(o=>`

<div class="card">

<h3>👤 ${o.name}</h3>
<p>📞 ${o.phone}</p>
<p>📍 ${o.address}</p>

<p>💰 Total: $${o.total}</p>

<p>Status:
<span class="status ${o.status === 'Pending' ? 'pending' : 'completed'}">
${o.status}
</span>
</p>

<button class="btn complete-btn"
onclick="updateStatus('${o._id}')">
✔ Mark Completed
</button>

</div>

`).join("");

});
}

function updateStatus(id){
fetch("http://localhost:5000/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status:"Completed"})
}).then(()=>loadOrders());
}

loadOrders();


function loadMenu(){
fetch("http://localhost:5000/menu")
.then(res=>res.json())
.then(data=>{
document.getElementById("menuList").innerHTML =
data.map(m=>`
<div class="menu-item">
  <div>
    <b>${m.name}</b> <br>
    $${m.price} • ${m.category}
  </div>

  <button class="delete-btn" onclick="deleteItem('${m._id}')">
    ❌
  </button>
</div>
`).join("");
});
}

function addItem(){

let name = document.getElementById("itemName").value;
let price = document.getElementById("itemPrice").value;
let category = document.getElementById("itemCategory").value;

// 🔥 VALIDATION
if(!name || !price || !category){
  alert("Fill all fields 😅");
  return;
}

fetch("http://localhost:5000/menu",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,price,category})
})
.then(res=>res.text())
.then(data=>{
  alert("Item Added ✅");

  // 🔥 INPUT CLEAR
  document.getElementById("itemName").value = "";
  document.getElementById("itemPrice").value = "";
  document.getElementById("itemCategory").value = "";

  loadMenu(); // refresh
})
.catch(err=>{
  console.log(err);
  alert("Error adding item ❌");
});

}

function deleteItem(id){

if(!confirm("Delete this item? ❌")) return;

fetch("http://localhost:5000/deleteMenu",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})
.then(()=>loadMenu());

}

setInterval(loadMenu, 3000);

loadMenu();
</script>

</body>
</html>
